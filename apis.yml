aid: wesco-international
name: WESCO International
url: https://raw.githubusercontent.com/api-evangelist/wesco-international/refs/heads/main/apis.yml
modified: '2026-05-03'
description: >-
  WESCO International is a Fortune 500 leading provider of business-to-business
  distribution, logistics services, and supply chain solutions for electrical,
  industrial, communications, and utility customers worldwide. WESCO serves
  over 150,000 customers through a network of branches and distribution centers
  and provides comprehensive digital integration capabilities including EDI,
  punchout, cXML, and API connectivity for procurement automation.
tags:
  - Distribution
  - Supply Chain
  - Electrical
  - Industrial
  - Procurement
  - B2B
  - EDI
  - Fortune 500
created: '2026-03-21'
specificationVersion: '0.19'
apis: []
common:
  - type: Website
    url: https://www.wesco.com/
  - type: DeveloperPortal
    url: https://apideveloper.wesco.com/s/
    title: WESCO API Developer Portal
  - type: Portal
    url: https://buy.wesco.com/
    title: WESCO eCommerce Portal
  - type: Documentation
    url: https://buy.wesco.com/content/eProcurement
    title: eProcurement Documentation
  - type: Features
    data:
      - name: EDI Integration
        description: >-
          Electronic Data Interchange with 700+ customer trading partners
          processing 270,000+ documents per month including purchase orders,
          acknowledgements, invoices, and advance ship notices.
      - name: PunchOut Catalog
        description: >-
          Customized PunchOut solution enabling procurement system integration
          so shopping carts are returned directly as purchase requisitions,
          supporting cXML and OCI standards.
      - name: API Developer Portal
        description: >-
          Dedicated API developer portal at apideveloper.wesco.com providing
          programmatic access to WESCO's catalog, pricing, orders, and
          supply chain data.
      - name: eCommerce Platform
        description: >-
          Full-featured B2B eCommerce platform (buy.wesco.com) for online
          product ordering, account management, and order tracking.
      - name: Supply Chain Management
        description: >-
          End-to-end supply chain solutions including vendor managed inventory,
          storeroom management, and point-of-use material management through
          vending solutions.
      - name: Catalog Integration
        description: >-
          CIF catalog and catalog exchange supporting Ariba, SAP, and Oracle
          procurement platforms with customized product catalogs and pricing.
      - name: WESCO Connect
        description: >-
          Digital services platform (connect.wesco.com) providing integrated
          access to supply chain management tools, analytics, and digital
          procurement capabilities.
  - type: UseCases
    data:
      - name: Procurement Automation
        description: >-
          Automate purchase order creation, approval workflows, and vendor
          invoicing through EDI, cXML, and PunchOut integrations with
          major ERP and procurement platforms.
      - name: Catalog Management
        description: >-
          Maintain accurate product catalogs, pricing, and availability
          data within corporate procurement systems using WESCO's catalog
          exchange and API connectivity.
      - name: Order Management
        description: >-
          Programmatically manage order lifecycle from quote to cash
          including order placement, status tracking, shipping notifications,
          and electronic invoicing.
      - name: Vendor Managed Inventory
        description: >-
          Automate inventory replenishment and storeroom management using
          WESCO's VMI programs integrated with facility management systems.
      - name: Supply Chain Visibility
        description: >-
          Gain real-time visibility into product availability, lead times,
          and shipment status across WESCO's global distribution network.
  - type: Integrations
    data:
      - name: SAP
        description: >-
          Native integration with SAP procurement and ERP systems for
          catalog exchange, purchase orders, and invoice processing.
      - name: Oracle
        description: >-
          Catalog and procurement integration with Oracle Procurement Cloud
          and Oracle ERP platforms.
      - name: Ariba (SAP)
        description: >-
          PunchOut and catalog integration with SAP Ariba procurement
          network for streamlined B2B purchasing.
      - name: EDI/ANSI X12
        description: >-
          Full EDI support for ANSI X12 transaction sets including 850
          (Purchase Order), 855 (Order Acknowledgment), 810 (Invoice),
          and 856 (Advance Ship Notice).
      - name: cXML
        description: >-
          Commerce XML (cXML) support for PunchOut, catalog management,
          and order transactions with modern procurement platforms.
maintainers:
